services:
  - type: web
    name: krishimind-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: models
      mountPath: /opt/render/project/src/models
      sizeGB: 2